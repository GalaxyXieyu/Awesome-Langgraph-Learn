<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">节点内部并发不要打碎父图</title>
  <desc id="desc">对比把同一职责里的多个 URL 请求拆成多个父图节点，和把批量 I/O 留在一个财经节点内部并发执行。</desc>
  <defs>
    <filter id="softShadow" x="-14%" y="-14%" width="128%" height="128%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#40515a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#74838a"/>
    </marker>
    <marker id="mutedArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L8,5 L2,8 Z" fill="#9aa7ad"/>
    </marker>
    <style>
      .bg { fill: #fbf7ef; }
      .title { font: 700 40px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #27343b; }
      .subtitle { font: 400 19px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #66737b; }
      .panel { fill: #fffdf8; stroke: #ded6ca; stroke-width: 1.4; filter: url(#softShadow); }
      .badPanel { fill: #fffaf5; stroke: #ddc4ad; stroke-width: 1.4; filter: url(#softShadow); }
      .goodPanel { fill: #fbfdfb; stroke: #c8d6cc; stroke-width: 1.4; filter: url(#softShadow); }
      .badgeBad { fill: #f5e7e0; stroke: #d6a894; stroke-width: 1.2; }
      .badgeGood { fill: #e9f1ec; stroke: #9eb5aa; stroke-width: 1.2; }
      .h { font: 700 23px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #2c3940; }
      .p { font: 400 16px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #43525a; }
      .small { font: 400 14px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #738089; }
      .api { font: 600 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #687781; }
      .node { stroke-width: 1.3; filter: url(#softShadow); }
      .line { stroke: #74838a; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .muteline { stroke: #9aa7ad; stroke-width: 1.6; fill: none; marker-end: url(#mutedArrow); }
      .warn { font: 700 16px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #8a5a46; }
      .ok { font: 700 16px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #416356; }
      .footer { font: 700 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #34454d; }
      .footerSmall { font: 400 15px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #65737b; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <text class="title" x="640" y="58" text-anchor="middle">同一职责里的批量 I/O，不要打碎父图</text>
  <text class="subtitle" x="640" y="94" text-anchor="middle">父图负责表达职责边界；节点内部负责处理这一职责里的多个等待</text>

  <!-- Left: not recommended -->
  <rect class="badPanel" x="58" y="136" width="548" height="480" rx="30"/>
  <rect class="badgeBad" x="92" y="166" width="92" height="34" rx="17"/>
  <text class="warn" x="138" y="189" text-anchor="middle">不推荐</text>
  <text class="h" x="334" y="191" text-anchor="middle">把每个 URL 都拆成父图节点</text>
  <text class="small" x="334" y="220" text-anchor="middle">父图被 I/O 细节淹没，职责边界反而变模糊</text>

  <rect class="node" x="96" y="330" width="92" height="54" rx="18" fill="#ffffff" stroke="#d8d1c7"/>
  <text class="api" x="142" y="363" text-anchor="middle">START</text>

  <rect class="node" x="258" y="254" width="98" height="54" rx="18" fill="#f4eee8" stroke="#d0b79b"/>
  <text class="api" x="307" y="287" text-anchor="middle">URL 1</text>
  <rect class="node" x="258" y="318" width="98" height="54" rx="18" fill="#f4eee8" stroke="#d0b79b"/>
  <text class="api" x="307" y="351" text-anchor="middle">URL 2</text>
  <rect class="node" x="258" y="382" width="98" height="54" rx="18" fill="#f4eee8" stroke="#d0b79b"/>
  <text class="api" x="307" y="415" text-anchor="middle">URL 3</text>
  <rect class="node" x="258" y="446" width="98" height="54" rx="18" fill="#f4eee8" stroke="#d0b79b"/>
  <text class="api" x="307" y="479" text-anchor="middle">URL N</text>

  <rect class="node" x="438" y="330" width="114" height="54" rx="18" fill="#ffffff" stroke="#d8d1c7"/>
  <text class="p" x="495" y="363" text-anchor="middle">汇总</text>

  <path class="line" d="M188 357 C214 300, 228 284, 250 281"/>
  <path class="line" d="M188 357 C214 346, 228 345, 250 345"/>
  <path class="line" d="M188 357 C214 398, 228 408, 250 409"/>
  <path class="line" d="M188 357 C214 458, 228 472, 250 473"/>
  <path class="line" d="M356 281 C390 286, 414 315, 430 341"/>
  <path class="line" d="M356 345 H430"/>
  <path class="line" d="M356 409 C390 404, 414 389, 430 373"/>
  <path class="line" d="M356 473 C394 456, 418 408, 433 381"/>

  <rect x="112" y="532" width="430" height="44" rx="22" fill="#ffffff" stroke="#ddc4ad" stroke-width="1.1"/>
  <text class="warn" x="327" y="560" text-anchor="middle">问题：URL 不是职责，父图却被迫管理 URL 细节</text>

  <!-- Right: recommended -->
  <rect class="goodPanel" x="674" y="136" width="548" height="480" rx="30"/>
  <rect class="badgeGood" x="708" y="166" width="92" height="34" rx="17"/>
  <text class="ok" x="754" y="189" text-anchor="middle">推荐</text>
  <text class="h" x="950" y="191" text-anchor="middle">父图只保留一个财经节点</text>
  <text class="small" x="950" y="220" text-anchor="middle">多个页面请求留在节点内部，用并发减少等待</text>

  <rect class="node" x="720" y="330" width="92" height="54" rx="18" fill="#ffffff" stroke="#d8d1c7"/>
  <text class="api" x="766" y="363" text-anchor="middle">START</text>

  <rect class="node" x="866" y="274" width="214" height="166" rx="26" fill="#edf3ef" stroke="#9fb5aa"/>
  <text class="h" x="973" y="312" text-anchor="middle">财经研究节点</text>
  <text class="api" x="973" y="340" text-anchor="middle">fetch_finance_pages</text>
  <text class="small" x="973" y="371" text-anchor="middle">内部并发请求多个页面</text>
  <text class="small" x="973" y="397" text-anchor="middle">统一返回 finance_pages</text>

  <rect class="node" x="1122" y="330" width="74" height="54" rx="18" fill="#ffffff" stroke="#d8d1c7"/>
  <text class="p" x="1159" y="363" text-anchor="middle">汇总</text>

  <path class="line" d="M812 357 H858"/>
  <path class="line" d="M1080 357 H1114"/>

  <rect x="894" y="462" width="158" height="88" rx="22" fill="#ffffff" stroke="#c8d6cc" stroke-width="1.1"/>
  <text class="api" x="973" y="492" text-anchor="middle">asyncio.gather</text>
  <text class="small" x="973" y="520" text-anchor="middle">URL 1 · URL 2 · URL 3 · URL N</text>

  <path class="muteline" d="M928 462 C910 440, 906 424, 914 407"/>
  <path class="muteline" d="M973 462 V440"/>
  <path class="muteline" d="M1018 462 C1036 440, 1040 424, 1032 407"/>

  <rect x="728" y="532" width="430" height="44" rx="22" fill="#ffffff" stroke="#c8d6cc" stroke-width="1.1"/>
  <text class="ok" x="943" y="560" text-anchor="middle">结果：父图看到 1 个职责节点，节点内部处理 N 个请求</text>

  <rect x="190" y="648" width="900" height="54" rx="27" fill="#ffffff" stroke="#d8cec1" stroke-width="1.2"/>
  <text class="footer" x="640" y="672" text-anchor="middle">判断规则：需要独立路由、审批、恢复，才升级成 Graph node</text>
  <text class="footerSmall" x="640" y="694" text-anchor="middle">只是同一职责里的批量等待，就留在节点内部并发，并把整理后的字段写回 state</text>
</svg>
