<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Agent 工具并行</title>
  <desc id="desc">展示 Agent 在一次消息中提出多个 tool calls，工具执行层并行运行搜索、数据库、计算器，再把多个 ToolMessage 返回给 Agent。</desc>
  <defs>
    <filter id="shadow" x="-16%" y="-16%" width="132%" height="132%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#40515a" flood-opacity="0.11"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#74838a"/>
    </marker>
    <style>
      .bg { fill: #fbf7ef; }
      .title { font: 700 40px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #27343b; }
      .subtitle { font: 400 19px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #65717a; }
      .box { filter: url(#shadow); stroke-width: 1.4; }
      .h { font: 700 22px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #2c3940; }
      .p { font: 400 17px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #43525a; }
      .api { font: 600 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #6e7a82; }
      .small { font: 400 14px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #748089; }
      .line { stroke: #71818a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .warn { fill: #fff7ed; stroke: #d7a66d; stroke-width: 1.3; }
      .foot { font: 600 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #35464e; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <text class="title" x="640" y="64" text-anchor="middle">能力解构：Agent 一次可以提出多个工具调用</text>
  <text class="subtitle" x="640" y="100" text-anchor="middle">工具并行的单位是 tool call，不是 graph node；结果以 ToolMessage 回到模型</text>

  <rect class="box" x="62" y="284" width="204" height="128" rx="28" fill="#ffffff" stroke="#d8d1c7"/>
  <text class="h" x="164" y="330" text-anchor="middle">Agent</text>
  <text class="p" x="94" y="365">查公司情况</text>
  <text class="api" x="164" y="392" text-anchor="middle">AIMessage</text>

  <path class="line" d="M268 348 C305 348, 324 348, 360 348"/>

  <rect class="box" x="374" y="214" width="252" height="268" rx="30" fill="#ffffff" stroke="#d8d1c7"/>
  <text class="h" x="500" y="258" text-anchor="middle">多个 tool_calls</text>
  <text class="api" x="414" y="304">search_news</text>
  <text class="api" x="414" y="348">query_finance</text>
  <text class="api" x="414" y="392">calculate_growth</text>
  <text class="small" x="414" y="438">模型本轮同时提出</text>

  <path class="line" d="M628 348 C664 348, 684 348, 718 348"/>

  <rect class="box" x="736" y="172" width="184" height="72" rx="22" fill="#eef3ef" stroke="#9db4aa"/>
  <text class="h" x="828" y="201" text-anchor="middle">搜索新闻</text>
  <text class="api" x="828" y="225" text-anchor="middle">tool</text>
  <rect class="box" x="736" y="312" width="184" height="72" rx="22" fill="#e9eff7" stroke="#9fb2c9"/>
  <text class="h" x="828" y="341" text-anchor="middle">查财务库</text>
  <text class="api" x="828" y="365" text-anchor="middle">tool</text>
  <rect class="box" x="736" y="452" width="184" height="72" rx="22" fill="#f3ece4" stroke="#d0b79b"/>
  <text class="h" x="828" y="481" text-anchor="middle">计算增长率</text>
  <text class="api" x="828" y="505" text-anchor="middle">tool</text>

  <path class="line" d="M922 208 C970 236, 996 286, 1028 320"/>
  <path class="line" d="M922 348 C970 348, 996 348, 1028 348"/>
  <path class="line" d="M922 488 C970 460, 996 410, 1028 376"/>

  <rect class="box" x="1042" y="284" width="190" height="128" rx="28" fill="#ffffff" stroke="#d8d1c7"/>
  <text class="h" x="1137" y="328" text-anchor="middle">工具结果</text>
  <text class="api" x="1137" y="358" text-anchor="middle">ToolMessage × 3</text>
  <text class="small" x="1080" y="390">交回 Agent 汇总</text>

  <rect class="warn" x="310" y="558" width="660" height="56" rx="18"/>
  <text class="p" x="640" y="592" text-anchor="middle">安全边界：有副作用的工具要先过审批 wrapper，不能因为能并行就直接执行。</text>

  <rect x="236" y="636" width="808" height="46" rx="23" fill="#ffffff" stroke="#d8cec1"/>
  <text class="foot" x="640" y="666" text-anchor="middle">判断：工具由模型临场选择时，讲 tools 并行；固定职责流程用 graph node。</text>
</svg>
