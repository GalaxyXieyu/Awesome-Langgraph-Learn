<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">胰腺癌辅助问诊中的 LangGraph 基础角色</title>
  <desc id="desc">用胰腺癌辅助问诊场景解释 State、Node、Edge 和 Reducer 的分工。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#64748b" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #fbfaf6; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #243042; }
      .subtitle { font: 400 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .section { font: 700 22px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #334155; }
      .label { font: 700 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #263444; }
      .small { font: 400 15px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #526173; }
      .tiny { font: 400 13px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .api { font: 600 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #64748b; }
      .card { stroke-width: 1.4; filter: url(#shadow); }
      .line { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #94a3b8; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <text x="64" y="62" class="title">从“医生整理病例”理解第一张图</text>
  <text x="64" y="94" class="subtitle">人能在脑中连续判断；Graph 需要把病例信息、处理单元、流转规则和累积证据显式拆开。</text>

  <rect x="64" y="128" width="270" height="452" rx="28" fill="#eef4ef" stroke="#b8c9bd" class="card"/>
  <text x="94" y="170" class="section">人类世界</text>
  <text x="94" y="210" class="label">医生自然会做什么？</text>
  <text x="94" y="246" class="small">读主诉、病史、化验</text>
  <text x="94" y="276" class="small">联想到风险因素</text>
  <text x="94" y="306" class="small">需要时追问缺失信息</text>
  <text x="94" y="336" class="small">把证据串成判断</text>
  <rect x="94" y="386" width="210" height="78" rx="18" fill="#fffaf0" stroke="#dec89e"/>
  <text x="118" y="418" class="label">隐式工作台</text>
  <text x="118" y="447" class="small">很多上下文在脑中保存</text>

  <rect x="390" y="128" width="500" height="452" rx="28" fill="#f7f3ea" stroke="#dacba8" class="card"/>
  <text x="420" y="170" class="section">Graph 世界</text>
  <text x="420" y="204" class="small">Graph 不会“自然想起来”，每件事都要有明确位置。</text>

  <rect x="430" y="236" width="190" height="98" rx="20" fill="#ffffff" stroke="#b8c9bd"/>
  <text x="458" y="270" class="label">State</text>
  <text x="458" y="298" class="small">病例共享工作台</text>
  <text x="458" y="320" class="api">PatientState</text>

  <rect x="660" y="236" width="190" height="98" rx="20" fill="#ffffff" stroke="#b7c7d9"/>
  <text x="688" y="270" class="label">Node</text>
  <text x="688" y="298" class="small">一次只做一步处理</text>
  <text x="688" y="320" class="api">extract_symptoms()</text>

  <rect x="430" y="376" width="190" height="98" rx="20" fill="#ffffff" stroke="#e6b8aa"/>
  <text x="458" y="410" class="label">Edge / Router</text>
  <text x="458" y="438" class="small">根据状态选择下一步</text>
  <text x="458" y="460" class="api">route_by_completeness()</text>

  <rect x="660" y="376" width="190" height="98" rx="20" fill="#ffffff" stroke="#c7bfdb"/>
  <text x="688" y="410" class="label">Reducer</text>
  <text x="688" y="438" class="small">新证据并入旧证据</text>
  <text x="688" y="460" class="api">Annotated[..., add]</text>

  <path d="M620 286 C642 286 638 286 660 286" class="soft-line"/>
  <path d="M755 334 C755 352 755 358 755 376" class="soft-line"/>
  <path d="M660 425 C642 425 638 425 620 425" class="soft-line"/>
  <path d="M525 376 C525 356 525 352 525 334" class="soft-line"/>

  <rect x="946" y="128" width="270" height="452" rx="28" fill="#edf4f8" stroke="#b7c7d9" class="card"/>
  <text x="976" y="170" class="section">教学迁移</text>
  <text x="976" y="210" class="label">胰腺癌辅助问诊图</text>
  <rect x="976" y="242" width="210" height="48" rx="14" fill="#ffffff" stroke="#b7c7d9"/>
  <text x="1000" y="272" class="small">采集症状与危险因素</text>
  <path d="M1081 290 L1081 318" class="soft-line"/>
  <rect x="976" y="318" width="210" height="48" rx="14" fill="#ffffff" stroke="#b8c9bd"/>
  <text x="1000" y="348" class="small">累积检查与病史证据</text>
  <path d="M1081 366 L1081 394" class="soft-line"/>
  <rect x="976" y="394" width="210" height="48" rx="14" fill="#ffffff" stroke="#dec89e"/>
  <text x="1000" y="424" class="small">信息不足则追问</text>
  <path d="M1081 442 L1081 470" class="soft-line"/>
  <rect x="976" y="470" width="210" height="48" rx="14" fill="#ffffff" stroke="#e6b8aa"/>
  <text x="1000" y="500" class="small">高风险则建议就医</text>

  <path d="M334 354 C356 354 366 354 390 354" class="line"/>
  <path d="M890 354 C912 354 922 354 946 354" class="line"/>

  <rect x="64" y="620" width="1152" height="54" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="92" y="653" class="small">一句话带走：医疗场景里，State 不是随便一个字典，而是病例共享工作台；Node、Edge、Reducer 把医生脑中的隐式动作拆成可观察的机器动作。</text>
  <text x="1040" y="696" class="tiny">教学示意，不构成诊疗建议</text>
</svg>
