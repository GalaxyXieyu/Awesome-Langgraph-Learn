<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">胰腺癌辅助问诊中的 Tool 边界</title>
  <desc id="desc">用胰腺癌辅助问诊场景解释 Tool 如何连接外部系统、裁剪结果并把原始数据旁路写入 State。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#64748b" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #fbfaf6; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #243042; }
      .subtitle { font: 400 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .section { font: 700 22px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #334155; }
      .label { font: 700 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #263444; }
      .small { font: 400 15px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #526173; }
      .tiny { font: 400 13px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .api { font: 600 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #64748b; }
      .card { stroke-width: 1.4; filter: url(#shadow); }
      .line { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #94a3b8; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .danger { fill: #fff1ee; stroke: #e6b8aa; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <text x="64" y="62" class="title">Tool 不是“让模型更聪明”，而是给它接上可靠外部能力</text>
  <text x="64" y="94" class="subtitle">在胰腺癌辅助问诊里，模型不能凭空编检查结果；Tool 负责取事实、做校验、裁剪上下文，并把原始数据留给图继续用。</text>

  <rect x="64" y="134" width="250" height="430" rx="28" fill="#eef4ef" stroke="#b8c9bd" class="card"/>
  <text x="94" y="176" class="section">用户问题</text>
  <rect x="94" y="218" width="190" height="90" rx="18" fill="#ffffff" stroke="#b8c9bd"/>
  <text x="118" y="252" class="label">“我这些症状</text>
  <text x="118" y="280" class="label">需要警惕吗？”</text>
  <text x="94" y="352" class="small">模型擅长组织语言，</text>
  <text x="94" y="382" class="small">但不能自己读取：</text>
  <text x="114" y="418" class="small">• 检验结果</text>
  <text x="114" y="448" class="small">• 影像报告</text>
  <text x="114" y="478" class="small">• 指南规则</text>

  <rect x="372" y="134" width="230" height="430" rx="28" fill="#f7f3ea" stroke="#dacba8" class="card"/>
  <text x="402" y="176" class="section">Agent / Graph</text>
  <rect x="402" y="222" width="170" height="80" rx="18" fill="#ffffff" stroke="#dacba8"/>
  <text x="430" y="255" class="label">判断需要事实</text>
  <text x="430" y="282" class="api">tool_calls</text>
  <path d="M487 302 L487 340" class="soft-line"/>
  <rect x="402" y="340" width="170" height="86" rx="18" fill="#ffffff" stroke="#dacba8"/>
  <text x="430" y="374" class="label">只读摘要</text>
  <text x="430" y="402" class="small">继续解释与追问</text>

  <rect x="660" y="112" width="250" height="474" rx="30" fill="#edf4f8" stroke="#b7c7d9" class="card"/>
  <text x="690" y="154" class="section">Tool 边界</text>
  <rect x="690" y="190" width="190" height="54" rx="16" fill="#ffffff" stroke="#b7c7d9"/>
  <text x="716" y="224" class="small">① 参数校验</text>
  <path d="M785 244 L785 264" class="soft-line"/>
  <rect x="690" y="264" width="190" height="54" rx="16" fill="#ffffff" stroke="#b7c7d9"/>
  <text x="716" y="298" class="small">② 调外部系统</text>
  <path d="M785 318 L785 338" class="soft-line"/>
  <rect x="690" y="338" width="190" height="54" rx="16" fill="#ffffff" stroke="#b7c7d9"/>
  <text x="716" y="372" class="small">③ 可恢复错误</text>
  <path d="M785 392 L785 412" class="soft-line"/>
  <rect x="690" y="412" width="190" height="54" rx="16" fill="#ffffff" stroke="#b7c7d9"/>
  <text x="716" y="446" class="small">④ 给 LLM 摘要</text>
  <path d="M785 466 L785 486" class="soft-line"/>
  <rect x="690" y="486" width="190" height="54" rx="16" fill="#ffffff" stroke="#b7c7d9"/>
  <text x="716" y="520" class="small">⑤ 原始数据旁路</text>
  <text x="714" y="566" class="api">query_lab_report()</text>

  <rect x="966" y="134" width="250" height="430" rx="28" fill="#f7eee9" stroke="#e6b8aa" class="card"/>
  <text x="996" y="176" class="section">外部系统</text>
  <rect x="996" y="216" width="190" height="58" rx="16" fill="#ffffff" stroke="#e6b8aa"/>
  <text x="1024" y="252" class="small">电子病历 / EMR</text>
  <rect x="996" y="304" width="190" height="58" rx="16" fill="#ffffff" stroke="#e6b8aa"/>
  <text x="1024" y="340" class="small">检验系统 / LIS</text>
  <rect x="996" y="392" width="190" height="58" rx="16" fill="#ffffff" stroke="#e6b8aa"/>
  <text x="1024" y="428" class="small">影像报告 / RIS</text>
  <rect x="996" y="480" width="190" height="58" rx="16" fill="#ffffff" stroke="#e6b8aa"/>
  <text x="1024" y="516" class="small">指南知识库</text>

  <path d="M314 350 C340 350 348 350 372 350" class="line"/>
  <path d="M602 350 C628 350 636 350 660 350" class="line"/>
  <path d="M910 350 C936 350 942 350 966 350" class="line"/>
  <path d="M690 513 C624 584 526 584 487 426" class="line"/>

  <rect x="372" y="604" width="844" height="54" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="402" y="637" class="small">规则：给 LLM 的是短摘要；给下游节点的是结构化原始数据；失败要返回可恢复错误，而不是让整张图直接崩掉。</text>
  <text x="1012" y="696" class="tiny">教学示意，不构成诊疗建议</text>
</svg>
