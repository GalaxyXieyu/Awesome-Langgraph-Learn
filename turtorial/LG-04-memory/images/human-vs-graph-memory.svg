<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">人类记忆和 Graph 记忆的差异</title>
  <desc id="desc">对比人类会自然记住上下文，而 Graph 需要显式 state、checkpoint、thread_id 和 store。</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#56636f" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6f7f89"/>
    </marker>
    <style>
      .bg { fill: #fbf7ef; }
      .title { font: 700 40px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #27343b; }
      .subtitle { font: 400 20px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #65717a; }
      .label { font: 700 26px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #2d3a40; }
      .body { font: 400 20px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #415058; }
      .small { font: 400 17px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #6b7880; }
      .api { font: 600 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #748089; }
      .card { stroke-width: 1.5; filter: url(#softShadow); }
      .line { stroke: #6f7f89; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <text class="title" x="640" y="76" text-anchor="middle">人会自然记住，Graph 需要显式保存</text>
  <text class="subtitle" x="640" y="112" text-anchor="middle">同样是连续对话，人类靠隐式上下文，Graph 靠状态流转和存档机制</text>

  <rect class="card" x="92" y="170" width="480" height="410" rx="30" fill="#eaf1ee" stroke="#9db4aa"/>
  <text class="label" x="132" y="220">人类助教</text>
  <text class="small" x="132" y="252">连续对话、共享上下文、很多判断是隐式的</text>

  <rect x="132" y="300" width="360" height="58" rx="18" fill="#ffffff" stroke="#c7d5cf"/>
  <text class="body" x="158" y="336">“我叫小明”</text>
  <rect x="168" y="382" width="360" height="58" rx="18" fill="#ffffff" stroke="#c7d5cf"/>
  <text class="body" x="194" y="418">“以后请用表格回答”</text>
  <rect x="132" y="464" width="360" height="58" rx="18" fill="#fff8ed" stroke="#dbc39f"/>
  <text class="body" x="158" y="500">“你还记得我的偏好吗？”</text>
  <text class="label" x="132" y="558">自然回答：记得</text>

  <rect class="card" x="708" y="170" width="480" height="410" rx="30" fill="#e9eff7" stroke="#9fb2c9"/>
  <text class="label" x="748" y="220">Graph / Agent</text>
  <text class="small" x="748" y="252">只看显式 state；不会自动拥有上一轮现场</text>

  <rect x="748" y="300" width="360" height="58" rx="18" fill="#ffffff" stroke="#c5d2e3"/>
  <text class="body" x="774" y="336">本次输入</text>
  <text class="api" x="1000" y="336">state</text>
  <rect x="748" y="382" width="360" height="58" rx="18" fill="#fff8ed" stroke="#dbc39f"/>
  <text class="body" x="774" y="418">聊天窗口存档</text>
  <text class="api" x="966" y="418">checkpoint</text>
  <rect x="748" y="464" width="360" height="58" rx="18" fill="#f3ece4" stroke="#d0b79b"/>
  <text class="body" x="774" y="500">用户长期笔记本</text>
  <text class="api" x="1028" y="500">store</text>
  <text class="label" x="748" y="558">显式找回后：才记得</text>

  <path class="line" d="M572 374 C620 374, 656 374, 704 374"/>
  <text class="small" x="640" y="348" text-anchor="middle">机器需要桥梁</text>

  <rect x="458" y="620" width="364" height="46" rx="23" fill="#ffffff" stroke="#d7cec2"/>
  <text class="body" x="640" y="650" text-anchor="middle">写在哪里，用什么 ID 找回来</text>
</svg>
